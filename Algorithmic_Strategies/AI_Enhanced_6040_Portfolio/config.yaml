# AI-Enhanced 60/40 Portfolio Configuration

# Data Parameters
data:
  start_date: "2015-01-01"
  end_date: "2025-12-31"
  lookback_period: 12  # months for model training
  rebalance_frequency: "M"  # Monthly rebalancing
  
# Asset Universe
assets:
  traditional:
    - ticker: "SPY"  # S&P 500 ETF (stocks)
      name: "US Equities"
    - ticker: "TLT"  # Long-term Treasury ETF (bonds)
      name: "US Bonds"
  alternative:
    - ticker: "BTC-USD"  # Bitcoin
      name: "Bitcoin"
      max_allocation: 0.30  # Maximum 30% allocation
    - ticker: "GLD"  # Gold ETF
      name: "Gold"
      max_allocation: 0.20  # Maximum 20% allocation

# Economic Indicators (Features)
indicators:
  vix:
    ticker: "^VIX"
    name: "CBOE Volatility Index"
  yield_spread:
    long_term: "^TNX"
    short_term: "^IRX"
    name: "Yield Spread"
  interest_rate:
    ticker: "DFF"
    name: "Fed Funds Rate"
    source: "FRED"
  dollar_index:
    ticker: "DX-Y.NYB"
    name: "US Dollar Index"
  oil:
    ticker: "CL=F"
    name: "Crude Oil"
  credit_spread:
    high_yield: "HYG"
    treasury: "TLT"
    name: "Credit Spread"

# Machine Learning Model
model:
  type: "RandomForestRegressor"
  parameters:
    n_estimators: 100
    max_depth: 5
    min_samples_split: 20
    min_samples_leaf: 10
    random_state: 42
  validation:
    test_size: 0.25
    cv_folds: 5
  
# Risk Management
risk:
  use_risk_parity: true
  max_drawdown_threshold: 0.15  # 15% stop-loss
  rebalance_threshold: 0.05  # Only rebalance if drift > 5%
  volatility_lookback: 12  # months for vol calculation
  
# Portfolio Constraints
portfolio:
  min_allocation: 0.0  # Minimum allocation per asset
  max_allocation: 1.0  # Maximum total allocation
  risk_free_rate: 0.02  # Annual risk-free rate for Sharpe calculation
  transaction_cost: 0.001  # 0.1% transaction cost
  
# Backtesting
backtest:
  initial_capital: 100000
  benchmark: "SPY"  # Buy-and-hold SPY benchmark
  metrics:
    - "sharpe_ratio"
    - "sortino_ratio"
    - "max_drawdown"
    - "cagr"
    - "volatility"
    - "calmar_ratio"
  
# Sensitivity Analysis
sensitivity:
  lookback_periods: [6, 12, 18, 24]  # months
  btc_max_allocations: [0.10, 0.20, 0.30, 0.40]
  max_depths: [3, 5, 7, 10]

# Output
output:
  results_dir: "results"
  figures_dir: "figures"
  models_dir: "models"
  save_predictions: true
  save_allocations: true
