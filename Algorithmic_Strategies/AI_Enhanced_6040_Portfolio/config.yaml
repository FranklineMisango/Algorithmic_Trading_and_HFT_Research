# AI-Enhanced 60/40 Portfolio Configuration

# Data Parameters
data:
  start_date: "2014-01-01"  # Extended history for better training
  end_date: "2025-12-31"
  lookback_period: 12  # months for model training
  rebalance_frequency: "M"  # Monthly rebalancing
  
# Asset Universe - Expanded
assets:
  traditional:
    - ticker: "SPY"  # S&P 500 ETF (stocks)
      name: "US Equities"
    - ticker: "TLT"  # Long-term Treasury ETF (bonds)
      name: "US Bonds"
  alternative:
    - ticker: "BTC-USD"  # Bitcoin
      name: "Bitcoin"
      max_allocation: 0.30  # Maximum 30% allocation
    - ticker: "GLD"  # Gold ETF
      name: "Gold"
      max_allocation: 0.20  # Maximum 20% allocation
    - ticker: "SHY"  # Short-term Treasury ETF
      name: "Short-term Bonds"
      max_allocation: 0.50  # Maximum 50% allocation
    - ticker: "IEF"  # Intermediate-term Treasury ETF
      name: "Intermediate Bonds"
      max_allocation: 0.40  # Maximum 40% allocation

# Economic Indicators - Enhanced
indicators:
  vix:
    ticker: "^VIX"
    name: "CBOE Volatility Index"
  yield_spread:
    long_term: "^TNX"
    short_term: "^IRX"
    name: "Yield Spread"
  interest_rate:
    ticker: "DFF"
    name: "Fed Funds Rate"
    source: "FRED"
  dollar_index:
    ticker: "DX-Y.NYB"
    name: "US Dollar Index"
  oil:
    ticker: "CL=F"
    name: "Crude Oil"
  credit_spread:
    high_yield: "HYG"
    treasury: "TLT"
    name: "Credit Spread"
  # New macroeconomic indicators
  unemployment:
    ticker: "UNRATE"
    name: "Unemployment Rate"
    source: "FRED"
  gdp_growth:
    ticker: "A191RL1Q225SBEA"
    name: "GDP Growth"
    source: "FRED"
  cpi:
    ticker: "CPIAUCSL"
    name: "Consumer Price Index"
    source: "FRED"
  # Sentiment indicators
  put_call_ratio:
    ticker: "PCALL"
    name: "Put/Call Ratio"
  aaai_sentiment:
    ticker: "AAII_SENTIMENT"
    name: "AAII Investor Sentiment"
  # Technical indicators
  rsi_spy:
    ticker: "SPY"
    name: "SPY RSI"
    period: 14
  macd_spy:
    ticker: "SPY"
    name: "SPY MACD"

# Machine Learning Model - Enhanced
model:
  type: "RandomForestRegressor"  # Can be changed to XGBoostRegressor (LightGBM has import issues)
  parameters:
    n_estimators: 200  # Increased from 100
    max_depth: 8  # Increased from 5 for better complexity
    min_samples_split: 15  # Adjusted for better generalization
    min_samples_leaf: 8  # Adjusted for better generalization
    random_state: 42
    n_jobs: -1
  feature_selection:
    method: "SelectKBest"
    k: 25  # Select top 25 features instead of 30
    score_func: "f_regression"
  hyperparameter_tuning:
    enabled: true
    cv_folds: 5
    param_grid:
      n_estimators: [100, 200, 300]
      max_depth: [6, 8, 10, 12]
      min_samples_split: [10, 15, 20]
      min_samples_leaf: [5, 8, 10]
  validation:
    test_size: 0.25
    cv_folds: 5
    metrics: ["mse", "rmse", "mae", "r2", "directional_accuracy", "sharpe_decomposition"]
  
# Risk Management - Enhanced
risk:
  use_risk_parity: true
  use_regime_adjustment: true  # New: integrate regime detection
  volatility_lookback: 24  # Increased from 12 for more stable estimates
  rolling_volatility: true  # New: use rolling volatility instead of fixed
  max_drawdown_threshold: 0.15  # 15% stop-loss
  rebalance_threshold: 0.05  # Only rebalance if drift > 5%
  regime_adjustments:
    defensive:  # High volatility, bear market
      equity_max: 0.3
      bond_min: 0.5
      gold_min: 0.1
    neutral:  # Normal conditions
      equity_max: 0.6
      bond_min: 0.3
      gold_min: 0.05
    aggressive:  # Low volatility, bull market
      equity_max: 0.8
      bond_min: 0.1
      gold_min: 0.02
  
# Portfolio Constraints - Enhanced
portfolio:
  min_allocation: 0.0  # Minimum allocation per asset
  max_allocation: 1.0  # Maximum total allocation
  risk_free_rate: 0.02  # Annual risk-free rate for Sharpe calculation
  transaction_cost: 0.001  # 0.1% transaction cost
  slippage: 0.0005  # 0.05% slippage cost
  market_impact: true  # New: model market impact for large trades
  position_limits:
    max_single_asset: 0.4  # Maximum 40% in any single asset
    min_single_asset: 0.01  # Minimum 1% per asset to avoid tiny positions
  
# Backtesting - Enhanced
backtest:
  initial_capital: 100000
  benchmark: "SPY"  # Buy-and-hold SPY benchmark
  metrics:
    - "sharpe_ratio"
    - "sortino_ratio"
    - "max_drawdown"
    - "cagr"
    - "volatility"
    - "calmar_ratio"
    - "information_ratio"
    - "alpha"
    - "beta"
  statistical_testing:
    enabled: true
    significance_level: 0.05
    tests: ["t_test_returns", "sharpe_ratio_test", "max_drawdown_test"]
  stress_testing:
    enabled: true
    scenarios:
      - name: "2008_Crisis"
        start_date: "2008-01-01"
        end_date: "2009-06-30"
      - name: "2020_Crash"
        start_date: "2020-02-01"
        end_date: "2020-04-30"
      - name: "Inflation_Surge"
        shock_type: "inflation"
        magnitude: 0.05  # 5% inflation shock
      - name: "Rate_Hike"
        shock_type: "interest_rate"
        magnitude: 0.025  # 2.5% rate hike
  
# Sensitivity Analysis
sensitivity:
  lookback_periods: [6, 12, 18, 24]  # months
  btc_max_allocations: [0.10, 0.20, 0.30, 0.40]
  max_depths: [3, 5, 7, 10]

# Output
output:
  results_dir: "results"
  figures_dir: "figures"
  models_dir: "models"
  save_predictions: true
  save_allocations: true
