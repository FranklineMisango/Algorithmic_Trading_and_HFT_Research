# Intraday Momentum Breakout Strategy - ES & NQ Futures Configuration

# Strategy Parameters
strategy:
  name: "Intraday Momentum Breakout"
  description: "Capture short-term intraday momentum bursts in ES/NQ futures using volatility-based breakout signals"
  
  # Instruments
  instruments:
    - "ES"  # E-mini S&P 500 Futures
    - "NQ"  # E-mini NASDAQ-100 Futures
  
  # Noise Area Calculation
  noise_area:
    lookback_days: 20  # Reduced from 90 to 20 for more responsive boundaries
    # Alternative lookbacks for testing: [10, 20, 30]
    method: "percentile"  # Changed back for testing
    
    # Percentile method (now secondary)
    upper_percentile: 80
    lower_percentile: 20
    
    # ATR method (now primary - more adaptive to current volatility)
    atr_period: 14  # ATR lookback period
    atr_multiplier: 1.5  # Multiplier for boundary width
    
    # Standard deviation method (alternative)
    std_multiplier: 1.5
  
  # Entry/Exit Rules (combined for signal generator)
  entry_exit:
    confirmation_bars: 2  # Reduced from 3 to 2 for faster entries on confirmed breakouts
    volume_threshold_percentile: 60  # Reduced from 70 to 60 for more trading opportunities
    max_hold_bars: 78  # Maximum bars to hold position (1 trading day)
    min_signal_strength: 40  # Reduced from 50 to 40 to capture more valid signals
    short_enabled: false  # Disable short trades for long-only strategy
    trend_filter_enabled: false  # Disable trend filter to allow trades in choppy markets
    trend_period: 50  # 50-period moving average for trend filter
    
  # Entry Rules
  entry:
    long_trigger: "break_above_upper"  # Price breaks above upper noise boundary
    short_trigger: "break_below_lower"  # Price breaks below lower noise boundary
    confirmation_bars: 1  # Number of bars to confirm breakout (prevent false breaks)
    
  # Exit Rules
  exit:
    # Primary exit: End of session
    session_close: true
    session_close_time: "16:00"  # 4:00 PM ET (adjust for futures hours)
    
    # Stop-loss: Momentum failure (price re-enters noise area) - now secondary
    momentum_failure_stop: true
    min_hold_bars: 50  # Increased from 20 to 50 to let winners run longer
    
    # NEW: Exit on opposite breakout (trend-following exit)
    opposite_breakout_exit: false  # Disabled - momentum strategies shouldn't exit on reversals
    
    # Time-based exit to prevent holding positions indefinitely
    max_hold_bars: 78  # Maximum 78 bars (1 trading day) to hold position
    
    # Trailing stop options - ENABLED
    trailing_stop_enabled: true  # Enabled for better risk management
    trailing_stop_percent: 0.01  # Increased from 0.005 to 1% for wider stops
    
    # Profit target exit
    profit_target_enabled: true  # Exit when unrealized P&L reaches target
    profit_target_multiplier: 1.5  # Target = 1.5x the noise area range
  
  # Position Sizing & Risk Management
  position_sizing:
    # Volatility targeting (CRITICAL)
    method: "volatility_target"
    target_daily_volatility: 10.0  # Increased to 10% for high-volatility recent markets (ES/NQ ~100% vol)
    
    # Leverage constraints
    max_leverage: 8.0  # Maximum 8x leverage
    min_leverage: 1.0  # Minimum leverage
    
    # Position limits
    max_contracts_per_instrument: 50  # Safety limit
    
    # Volatility estimation
    volatility_estimation: "ewma"  # Options: "std", "ewma", "garch" 
    vol_lookback: 20  # Days for volatility calculation
    ewma_span: 20  # Span for EWMA volatility
  
  # Portfolio Allocation (from research findings)
  portfolio:
    # Optimal allocation per research (adjusted for NQ-focused strategy)
    allocation:
      NQ_momentum: 0.95  # Increased to 95% for higher NQ exposure
      ES_momentum: 0.05  # Reduced to 5%  
      NQ_long_only: 0.0  # 0% to static long NQ (causing long-term holds)
    
    initial_capital: 2500000  # $2.5M starting capital (sized to trade 1 NQ contract at $20k+ prices)
    rebalance_frequency: "daily"  # Adjust allocations daily
  
  # Transaction Costs (CRITICAL - Conservative Assumptions)
  transaction_costs:
    # Commission (per contract, round-trip)
    commission_per_contract: 2.0  # Reduced from 4.20 for testing
    
    # Slippage (in ticks)
    slippage_ticks: 0.5  # Reduced from 1.0 for testing
    # Research showed slippage significantly impacts returns
    
    # Instrument-specific tick data
    ES:
      tick_value: 12.50  # $12.50 per tick
      tick_size: 0.25  # 0.25 point per tick
    NQ:
      tick_value: 5.00   # $5.00 per tick
      tick_size: 0.25  # 0.25 point per tick
    
    # Order type (affects slippage)
    order_type: "market"  # Options: "market", "limit", "adaptive"
    limit_order_offset_ticks: 1  # If using limit orders
  
  # Risk Management
  risk_management:
    # Daily loss limits
    max_daily_loss_pct: 0.05  # 5% max daily loss
    max_daily_loss_absolute: 5000  # $5,000 max daily loss
    
    # Drawdown limits
    max_drawdown_pct: 0.20  # Halt strategy at 20% drawdown
    
    # Margin requirements (per contract)
    margin_requirements:
      ES: 12000  # Approximate intraday margin
      NQ: 16000  # Approximate intraday margin
    
    # Position monitoring
    max_position_hold_hours: 6.5  # Max hours to hold (full session)

# Data Parameters
data:
  # Instruments
  instruments:
    - symbol: "ES"
      name: "E-mini S&P 500"
      exchange: "CME"
      multiplier: 50        # $50 per point
      tick_size: 0.25       # Minimum price increment
    - symbol: "NQ"
      name: "E-mini NASDAQ-100"
      exchange: "CME"
      multiplier: 20        # $20 per point
      tick_size: 0.25       # Minimum price increment
  
  # Time range
  start_date: "2011-02-01"  # Strategy improves from 2018+ per research
  end_date: null  # null = today
  
  # Intraday frequency
  timeframe: "5min"  # Options: "1min", "5min", "15min"
  
  # Trading hours (Regular Trading Hours)
  trading_hours:
    start: "09:30"  # Market open ET
    end: "16:00"    # Market close ET
    timezone: "America/New_York"
  
  # Data filtering
  min_volume: 1000  # Minimum volume per bar
  exclude_holidays: true
  exclude_half_days: true

# Backtesting
backtest:
  # Walk-forward analysis
  walk_forward_enabled: true
  training_window_days: 365  # 1 year training
  test_window_days: 90       # 3 months testing
  step_size_days: 90         # Re-optimize every 3 months
  
  # Parameter optimization
  optimize_params: ["lookback_days", "target_daily_volatility"]
  param_ranges:
    lookback_days: [30, 60, 90, 120]
    target_daily_volatility: [0.02, 0.03, 0.04]
  
  # Evaluation metric
  optimization_metric: "sharpe_ratio"  # Primary: Sharpe Ratio
  min_sharpe_threshold: 1.0  # Minimum acceptable Sharpe

# Performance Metrics
metrics:
  # Returns
  - "total_return"
  - "annual_return"
  - "monthly_return"
  - "daily_return"
  
  # Risk-adjusted
  - "sharpe_ratio"
  - "sortino_ratio"
  - "calmar_ratio"
  
  # Drawdown
  - "max_drawdown"
  - "avg_drawdown"
  - "drawdown_duration"
  
  # Trading
  - "win_rate"
  - "profit_factor"
  - "avg_win_loss_ratio"
  - "num_trades"
  - "trades_per_day"
  
  # Capacity
  - "avg_daily_volume_participation"
  - "max_position_size"

# Stress Testing
stress_tests:
  # High volatility scenarios
  - name: "flash_crash"
    description: "Severe temporary slippage (5-10 ticks)"
    slippage_multiplier: 5.0
    
  - name: "march_2020"
    description: "COVID crash high volatility"
    start_date: "2020-03-01"
    end_date: "2020-04-30"
    
  - name: "extended_flat"
    description: "7-year flat period like ES 2010-2017"
    lookback: 2520  # 7 years of trading days

# Output
output:
  results_dir: "results"
  models_dir: "models"
  logs_dir: "logs"
  
  # Reports
  generate_html_report: true
  generate_tearsheet: true
  save_trades: true
  save_signals: true
  
  # Visualization
  plot_equity_curve: true
  plot_drawdown: true
  plot_returns_distribution: true
  plot_signal_analysis: true
  plot_noise_area: true

# Logging
logging:
  level: "INFO"
  file: "logs/intraday_momentum.log"
  console: true
  
# Alerts (for live trading)
alerts:
  enabled: false
  email: "your_email@example.com"
  slack_webhook: null
  
  # Alert triggers
  triggers:
    - "daily_loss_limit_breach"
    - "max_drawdown_breach"
    - "exceptional_win"
    - "exceptional_loss"
